<!DOCTYPE html>
<html>
<head>
    <meta name="WS" content="efcb2f8ad04736abfef1d38a92af1a87">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="target-densitydpi=device-dpi,user-scalable=1,minimum-scale=1,maximum-scale=2.5,initial-scale=1,width=device-width">
    <meta http-equiv="X-UA-Compatible" content="IE=edge;">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>TOÁN THẦY NGUYỄN QUỐC CHÍ - LỚP 11</title>
    <link rel="shortcut icon" href="https://ssl.gstatic.com/images/branding/productlogos/sheets_2026/v2/ico/sheets_2026_256dp.ico">
    
    <style>
        html, body {
          height: 100%;
          margin: 0;
          padding: 0;
          overflow: hidden;
        }
        
        /* Khung bao đóng vai trò như một chiếc kéo cắt phần thừa */
        #sheets-viewport {
          width: 100%;
          height: 100%;
          overflow: hidden;
          position: relative;
        }
        
        /* Đẩy iframe lên trên 200px để ẩn hoàn toàn phần banner đầu tiên */
        .iframe-container {
          position: absolute;
          top: -200px; /* Di chuyển vùng hiển thị lên 200px */
          left: 0;
          width: 100%;
          /* Cộng thêm 200px vào chiều cao để bù lại phần bị đẩy lên, tránh khoảng trắng phía dưới */
          height: calc(100% + 200px); 
          border: none;
        }
    </style>
</head>
<body>

    <div id="sheets-viewport">
        <iframe class="iframe-container" src="https://docs.google.com/spreadsheets/d/1fIBqWIrdb99jGL_tkjGQUywmSX7PK3LvDfo8PSie2MQ/htmlview/sheet?headers=false&gid=0&chrome=false"></iframe>
    </div>

</body>
</html>
